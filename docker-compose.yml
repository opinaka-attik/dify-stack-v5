services:
  # Traefik - Reverse Proxy avec hardening
  traefik:
    image: traefik:v3.3.4
    container_name: traefik
    security_opt:
      - no-new-privileges:true
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dify_network
    restart: always

  # SeaweedFS (Remplacement MinIO)
  seaweedfs:
    image: chrislusf/seaweedfs:3.84
    container_name: seaweedfs
    command: "server -s3 -dir=/data"
    ports:
      - "8333:8333"
      - "8080:8080"
      - "9333:9333"
    volumes:
      - seaweed_data:/data
    networks:
      - dify_network
    restart: always

  # Dify API
  api:
    image: langgenius/dify-api:0.15.3
    container_name: dify-api
    environment:
      - STORAGE_TYPE=s3
      - S3_ENDPOINT=http://seaweedfs:8333
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=dify
    depends_on:
      - db
      - redis
      - seaweedfs
    networks:
      - dify_network
    restart: always

  # Dify Worker
  worker:
    image: langgenius/dify-api:0.15.3
    container_name: dify-worker
    command: "worker"
    depends_on:
      - db
      - redis
      - seaweedfs
    networks:
      - dify_network
    restart: always

  # Dify Web UI
  web:
    image: langgenius/dify-web:0.15.3
    container_name: dify-web
    depends_on:
      - api
    networks:
      - dify_network
    restart: always

  # PostgreSQL
  db:
    image: postgres:17.4-alpine
    container_name: dify-db
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dify_network
    restart: always

  # Redis
  redis:
    image: redis:7.4.2-alpine
    container_name: dify-redis
    volumes:
      - redisdata:/data
    networks:
      - dify_network
    restart: always

networks:
  dify_network:
    driver: bridge

volumes:
  seaweed_data:
  pgdata:
  redisdata:
