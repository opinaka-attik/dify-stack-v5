services:
  # --- SECURITY LAYER ---
  # [M4] Utilisation du tag précis pour socket-proxy (digest recommandé en prod)
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.4.2
    container_name: socket-proxy
    security_opt: [no-new-privileges:true]
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - SERVICES=1
      - EVENTS=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket_proxy_net
    restart: unless-stopped # [I2] Standardisation unless-stopped

  traefik:
    image: traefik:v3.6.12
    container_name: traefik
    security_opt: [no-new-privileges:true]
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://socket-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - socket-proxy
    networks:
      - socket_proxy_net
      - dify_net
    labels:
      # [C2] Security Headers Middleware
      - "traefik.http.middlewares.secheaders.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.secheaders.headers.frameDeny=true"
      - "traefik.http.middlewares.secheaders.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.secheaders.headers.referrerPolicy=strict-origin-when-cross-origin"
    restart: unless-stopped

  # --- STORAGE LAYER (S3) ---
  seaweedfs:
    image: chrislusf/seaweedfs:4.17
    container_name: seaweedfs
    command: "server -s3 -dir=/data"
    volumes:
      - seaweed_data:/data
    networks:
      - dify_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # --- DIFY STACK (v1.13.3) ---
  api:
    image: langgenius/dify-api:1.13.3
    container_name: dify-api
    environment:
      - STORAGE_TYPE=s3
      - S3_ENDPOINT=http://seaweedfs:8333
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=dify
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - REDIS_HOST=redis
      - ALLOWED_CONSOLE_CIDR=${ALLOWED_CONSOLE_CIDR:-127.0.0.1/32} # [I3] Restreint par défaut
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dify_net
    restart: unless-stopped

  worker:
    image: langgenius/dify-api:1.13.3
    container_name: dify-worker
    command: "worker"
    environment:
      - STORAGE_TYPE=s3
      - S3_ENDPOINT=http://seaweedfs:8333
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dify_net
    restart: unless-stopped

  web:
    image: langgenius/dify-web:1.13.3
    container_name: dify-web
    depends_on:
      - api
    networks:
      - dify_net
    restart: unless-stopped

  # --- KNOWLEDGE ENGINE ---
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.8
    container_name: weaviate
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH='/var/lib/weaviate'
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - dify_net
    restart: unless-stopped

  # --- AUTHENTICATION (SSO) ---
  authentik:
    image: ghcr.io/goauthentik/server:2026.2.1
    container_name: authentik
    command: server
    environment:
      - AUTHENTIK_REDIS__HOST=redis
      - AUTHENTIK_POSTGRESQL__HOST=db
      - AUTHENTIK_POSTGRESQL__USER=postgres
      - AUTHENTIK_POSTGRESQL__PASSWORD=${DB_PASSWORD}
    healthcheck: # [M5] Ajout Healthcheck Authentik
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      - db
      - redis
    networks:
      - dify_net # [I5] Isolation réseau
    restart: unless-stopped

  # --- DATABASES ---
  db:
    image: postgres:17-alpine
    container_name: dify-db
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS="--auth-host=scram-sha-256" # [I1] SCRAM Auth
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dify_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8.6-alpine
    container_name: dify-redis
    volumes:
      - redis_data:/data
    networks:
      - dify_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  socket_proxy_net:
    internal: true
  dify_net:
    driver: bridge

volumes:
  seaweed_data:
  pgdata:
  redis_data:
  weaviate_data:
